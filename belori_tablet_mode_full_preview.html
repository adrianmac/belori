
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#E8E4E0}

/* ── outer wrapper ── */
.outer{padding:20px 16px 24px;background:#E8E4E0;display:flex;flex-direction:column;align-items:center;gap:16px}
.screen-label{font-size:11px;font-weight:500;color:#9CA3AF;letter-spacing:.06em;text-transform:uppercase;text-align:center}

/* ── iPad frame ── */
.ipad-frame{
  width:100%;max-width:820px;
  background:#1C1012;border-radius:22px;padding:14px;
  border:1px solid #2C2020;
}
.ipad-screen{
  background:#F8F4F0;border-radius:12px;overflow:hidden;
  display:flex;height:560px;
}

/* ── Tablet sidebar (72px icon rail) ── */
.t-sidebar{
  width:72px;background:#fff;border-right:1px solid #E5E7EB;
  display:flex;flex-direction:column;align-items:center;flex-shrink:0;
}
.t-sb-top{
  width:100%;padding:14px 0 10px;border-bottom:1px solid #E5E7EB;
  display:flex;justify-content:center;
}
.t-logo{width:36px;height:36px;background:#1C1012;border-radius:9px;display:flex;align-items:center;justify-content:center}
.t-nav{padding:8px 6px;flex:1;display:flex;flex-direction:column;gap:2px;width:100%;overflow-y:auto}
.t-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:10px 4px;border-radius:12px;cursor:pointer;width:100%;
  position:relative;transition:all .14s;border:none;background:transparent;
}
.t-item:active{transform:scale(.95)}
.t-item.on{background:#FDF5F6}
.t-item svg{width:22px;height:22px;stroke:#9CA3AF;stroke-width:1.4;fill:none}
.t-item.on svg{stroke:#C9697A}
.t-item-lbl{font-size:9px;color:#9CA3AF;text-align:center;line-height:1.2;font-weight:400}
.t-item.on .t-item-lbl{color:#C9697A;font-weight:500}
.t-item-badge{
  position:absolute;top:6px;right:5px;min-width:17px;height:17px;
  border-radius:9px;font-size:9px;font-weight:500;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
}
.tb-red{background:#B91C1C;color:#fff}
.tb-purple{background:#7C3AED;color:#fff}
.t-sb-foot{padding:10px 6px 14px;border-top:1px solid #E5E7EB;width:100%;display:flex;justify-content:center}
.t-user-dot{width:40px;height:40px;border-radius:50%;background:#FDF5F6;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#C9697A;cursor:pointer}

/* ── Main area ── */
.t-main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* Topbar */
.t-topbar{
  height:60px;background:#fff;border-bottom:1px solid #E5E7EB;
  display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;
}
.t-page-info{flex:1}
.t-page-title{font-size:17px;font-weight:500;color:#1C1012}
.t-page-sub{font-size:12px;color:#9CA3AF;margin-top:1px}
.t-topbar-actions{display:flex;gap:8px;align-items:center}
.t-icon-btn{width:48px;height:48px;border:1.5px solid #E5E7EB;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6B7280;flex-shrink:0}
.t-icon-btn:active{background:#FDF5F6;border-color:#C9697A}
.t-primary-btn{height:48px;padding:0 20px;background:#C9697A;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap}
.t-primary-btn:active{background:#B85868;transform:scale(.97)}
.t-ghost-btn{height:48px;padding:0 18px;background:#fff;color:#6B7280;border:1.5px solid #E5E7EB;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.t-ghost-btn:active{background:#F8F4F0}

/* Alert bar */
.t-alert{
  background:#FFFBEB;border-bottom:1px solid #FDE68A;padding:11px 18px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.t-alert-text{font-size:13px;color:#78350F;flex:1;line-height:1.4}
.t-alert-btn{
  height:44px;padding:0 16px;background:#FDE68A;color:#78350F;border:none;
  border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.t-alert-btn:active{background:#FCD34D}

/* Content scroll */
.t-content{flex:1;overflow-y:auto;padding:16px;background:#F8F4F0}

/* Stat grid 2-col */
.t-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.t-stat{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px}
.t-stat-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.t-stat-icon svg{width:22px;height:22px;fill:none}
.t-stat-num{font-size:22px;font-weight:500;color:#1C1012;line-height:1}
.t-stat-lbl{font-size:12px;color:#9CA3AF;margin-top:3px}
.t-stat-sub{font-size:11px;margin-top:2px}

/* Quick actions */
.t-qa{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.t-qa-btn{
  background:#fff;border:1.5px solid #E5E7EB;border-radius:14px;
  padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;transition:all .14s;
}
.t-qa-btn:active{border-color:#C9697A;background:#FDF5F6;transform:scale(.97)}
.t-qa-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.t-qa-icon svg{width:22px;height:22px;fill:none}
.t-qa-lbl{font-size:12px;font-weight:500;color:#1C1012;text-align:center;line-height:1.3}

/* Cards */
.t-card{background:#fff;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden;margin-bottom:12px}
.t-card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #E5E7EB}
.t-card-title{font-size:14px;font-weight:500;color:#1C1012}
.t-card-sub{font-size:12px;color:#9CA3AF;margin-top:2px}
.t-card-action{height:40px;padding:0 16px;background:#FDF5F6;color:#C9697A;border:1px solid #E8B4BB;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer}
.t-card-action-red{height:40px;padding:0 16px;background:#FEE2E2;color:#B91C1C;border:1px solid #FCA5A5;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer}

/* Rows */
.t-row{display:flex;align-items:center;gap:13px;padding:14px 18px;border-bottom:1px solid #F3F4F6;cursor:pointer;min-height:68px;transition:background .1s}
.t-row:last-child{border-bottom:none}
.t-row:active{background:#FDF5F6}
.t-row-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.t-row-main{flex:1;min-width:0}
.t-row-name{font-size:13px;font-weight:500;color:#1C1012}
.t-row-sub{font-size:12px;color:#9CA3AF;margin-top:2px}
.t-row-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.t-row-action-btn{height:40px;padding:0 14px;background:#fff;border:1.5px solid #E5E7EB;border-radius:8px;font-size:12px;font-weight:500;color:#6B7280;cursor:pointer;white-space:nowrap}
.t-row-action-btn:active{border-color:#C9697A;color:#C9697A}
.t-row-action-red{border-color:#FCA5A5;color:#B91C1C;background:#FFF8F8}

/* Badges */
.bdg{display:inline-block;font-size:10px;font-weight:500;padding:3px 9px;border-radius:99px;white-space:nowrap}
.b-green{background:#DCFCE7;color:#15803D}
.b-amber{background:#FEF3C7;color:#B45309}
.b-red{background:#FEE2E2;color:#B91C1C}
.b-blue{background:#DBEAFE;color:#1D4ED8}
.b-purple{background:#EDE9FE;color:#7C3AED}
.b-rosa{background:#FDF5F6;color:#C9697A}
.b-gray{background:#F3F4F6;color:#6B7280}

/* Progress */
.prog{height:5px;background:#E5E7EB;border-radius:3px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:3px}

/* Section label */
.sec-lbl{font-size:11px;font-weight:500;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:#E5E7EB}

/* Dress card */
.dress-card-row{display:flex;gap:12px;align-items:flex-start}
.dress-icon-big{width:52px;height:66px;background:#F8F4F0;border-radius:10px;border:1px solid #E5E7EB;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.info-tile{background:#F8F4F0;border-radius:10px;padding:10px 14px;flex:1}
.info-tile-label{font-size:10px;font-weight:500;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.info-tile-val{font-size:13px;font-weight:500;color:#1C1012}
.info-tile-sub{font-size:11px;color:#9CA3AF;margin-top:2px}

/* Alteration kanban mini */
.alt-kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.alt-col{background:#F8F4F0;border-radius:10px;padding:8px}
.alt-col-head{font-size:10px;font-weight:500;color:#9CA3AF;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.alt-card{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:10px;cursor:pointer;transition:border-color .1s}
.alt-card:active{border-color:#C9697A}
.alt-card-name{font-size:12px;font-weight:500;color:#1C1012}
.alt-card-work{font-size:11px;color:#9CA3AF;margin-top:2px}
.alt-empty{font-size:11px;color:#9CA3AF;text-align:center;padding:8px 0;font-style:italic}

/* Screen nav */
.screen-nav{display:flex;gap:8px;padding:0 0 2px;overflow-x:auto;flex-wrap:wrap;justify-content:center}
.snav-btn{padding:7px 16px;border-radius:99px;border:1px solid #E5E7EB;background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:#6B7280;white-space:nowrap;transition:all .12s}
.snav-btn.active{background:#C9697A;color:#fff;border-color:#C9697A}

/* Event card (events list) */
.ev-card{background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:16px 18px;margin-bottom:10px;cursor:pointer}
.ev-card.urgent{border-left:3px solid #B91C1C}
.ev-card:active{background:#FDF5F6}
.ev-card-top{display:flex;gap:14px;align-items:flex-start;margin-bottom:8px}
.ev-date{min-width:44px;text-align:center}
.ev-date-m{font-size:10px;font-weight:500;color:#9CA3AF;text-transform:uppercase}
.ev-date-d{font-size:24px;font-weight:500;color:#1C1012;line-height:1}
.ev-info{flex:1}
.ev-name{font-size:14px;font-weight:500;color:#1C1012}
.ev-venue{font-size:12px;color:#9CA3AF;margin-top:2px}
.ev-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.ev-right{text-align:right}
.ev-val{font-size:15px;font-weight:500;color:#1C1012}
.ev-paid{font-size:11px;margin-top:2px}
.ev-foot{border-top:1px solid #F3F4F6;padding-top:8px;display:flex;justify-content:space-between;align-items:center}

/* Overdue panel */
.overdue-banner{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.overdue-banner svg{width:20px;height:20px;flex-shrink:0;stroke:#B91C1C}
.ob-text{flex:1;font-size:13px;color:#7F1D1D;line-height:1.4}
.ob-btn{height:44px;padding:0 16px;background:#B91C1C;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* Filter tabs */
.t-filter-tabs{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 18px;display:flex;gap:0;flex-shrink:0}
.t-ftab{padding:12px 16px;font-size:13px;color:#9CA3AF;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.t-ftab.on{color:#C9697A;font-weight:500;border-bottom-color:#C9697A}

/* Payments screen */
.pay-row{display:flex;align-items:center;gap:13px;padding:14px 18px;border-bottom:1px solid #F3F4F6;min-height:68px;cursor:pointer}
.pay-row:active{background:#FDF5F6}
.pay-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.pay-info{flex:1}
.pay-name{font-size:13px;font-weight:500;color:#1C1012}
.pay-sub{font-size:12px;color:#9CA3AF;margin-top:2px}
.pay-amount{font-size:15px;font-weight:500;text-align:right}
.pay-action{height:44px;padding:0 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;white-space:nowrap}
</style>

<div class="outer">
  <div class="screen-nav" id="screen-nav">
    <button class="snav-btn active" onclick="showScreen('dashboard',this)">Dashboard</button>
    <button class="snav-btn" onclick="showScreen('events',this)">Events</button>
    <button class="snav-btn" onclick="showScreen('event-detail',this)">Event detail</button>
    <button class="snav-btn" onclick="showScreen('rentals',this)">Dress rentals</button>
    <button class="snav-btn" onclick="showScreen('alterations',this)">Alterations</button>
    <button class="snav-btn" onclick="showScreen('payments',this)">Payments</button>
  </div>

  <div class="ipad-frame">
    <div class="ipad-screen">

      <!-- SIDEBAR (always visible) -->
      <div class="t-sidebar">
        <div class="t-sb-top">
          <div class="t-logo">
            <svg width="18" height="18" viewBox="0 0 32 32" fill="none"><path d="M7 25V7l18 18V7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div class="t-nav" id="sidebar-nav"></div>
        <div class="t-sb-foot">
          <div class="t-user-dot">IM</div>
        </div>
      </div>

      <!-- MAIN (screen content swaps here) -->
      <div class="t-main" id="main-area"></div>

    </div>
  </div>
  <div class="screen-label" id="screen-label-text">Dashboard — 48px tap targets · icon rail · full-width cards</div>
</div>

<script>
const NAV = [
  {id:'dashboard', lbl:'Home',      icon:'<rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/>'},
  {id:'events',    lbl:'Events',    icon:'<rect x="1" y="2" width="14" height="12" rx="1.5"/><path d="M5 1v2M11 1v2M1 6h14" stroke-linecap="round"/>', badge:{v:14,c:'tb-purple'}},
  {id:'clients',   lbl:'Clients',   icon:'<circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke-linecap="round"/>'},
  {id:'alterations',lbl:'Alterations',icon:'<path d="M3 3l10 10M13 3L3 13" stroke-linecap="round"/><circle cx="3" cy="3" r="2"/><circle cx="13" cy="13" r="2"/>', badge:{v:4,c:'tb-red'}},
  {id:'rentals',   lbl:'Rentals',   icon:'<path d="M8 1c-1.5 0-4 1.2-4 4v3L2 14h12L14 8V5c0-2.8-2.5-4-4-4Z" stroke-linejoin="round"/>'},
  {id:'inventory', lbl:'Inventory', icon:'<rect x="1" y="7" width="14" height="7" rx="1"/><path d="M3 7V5a5 5 0 0 1 10 0v2" stroke-linecap="round"/>'},
  {id:'payments',  lbl:'Payments',  icon:'<rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M1 7h14"/>', badge:{v:3,c:'tb-red'}},
  {id:'settings',  lbl:'Settings',  icon:'<circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.4 1.4M11.6 11.6l1.4 1.4M3 13l1.4-1.4M11.6 4.4l1.4-1.4" stroke-linecap="round"/>'},
]

let currentScreen = 'dashboard'

function buildSidebar(active){
  const nav = document.getElementById('sidebar-nav')
  nav.innerHTML = NAV.map(n=>`
    <button class="t-item${n.id===active?' on':''}" onclick="showScreen('${n.id}',null)">
      <svg width="22" height="22" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">${n.icon}</svg>
      <span class="t-item-lbl">${n.lbl}</span>
      ${n.badge?`<span class="t-item-badge ${n.badge.c}">${n.badge.v}</span>`:''}
    </button>
  `).join('')
}

const SCREENS = {

dashboard: {
  label: 'Dashboard — 48px tap targets · icon rail · full-width cards',
  render: ()=>`
    <div class="t-topbar">
      <div class="t-page-info"><div class="t-page-title">Good morning, Isabel</div><div class="t-page-sub">Monday · 5 appointments today</div></div>
      <div class="t-topbar-actions">
        <div class="t-icon-btn"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="#6B7280" stroke-width="1.4"/><path d="M10.5 10.5L14 14" stroke="#6B7280" stroke-width="1.4" stroke-linecap="round"/></svg></div>
        <button class="t-primary-btn">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
          New client
        </button>
      </div>
    </div>
    <div class="t-alert">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none" style="flex-shrink:0"><circle cx="8" cy="8" r="7" stroke="#B45309" stroke-width="1.2"/><path d="M8 5v3M8 11v.5" stroke="#B45309" stroke-width="1.4" stroke-linecap="round"/></svg>
      <div class="t-alert-text"><strong>Sophia R.</strong> — final fitting not scheduled &amp; deposit ($450) overdue · 6 days to wedding</div>
      <button class="t-alert-btn">Fix now</button>
    </div>
    <div class="t-content">
      <div class="t-stats">
        <div class="t-stat"><div class="t-stat-icon" style="background:#DCFCE7"><svg viewBox="0 0 16 16" stroke="#15803D"><rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M1 7h14" stroke-linecap="round"/></svg></div><div><div class="t-stat-num" style="color:#15803D">$18,240</div><div class="t-stat-lbl">Revenue this month</div><div class="t-stat-sub" style="color:#15803D">+22% vs Feb</div></div></div>
        <div class="t-stat"><div class="t-stat-icon" style="background:#FEE2E2"><svg viewBox="0 0 16 16" stroke="#B91C1C"><circle cx="8" cy="8" r="7"/><path d="M8 5v3M8 11v.5" stroke-linecap="round"/></svg></div><div><div class="t-stat-num" style="color:#B91C1C">$1,650</div><div class="t-stat-lbl">Payments overdue</div><div class="t-stat-sub" style="color:#B91C1C">2 clients</div></div></div>
        <div class="t-stat"><div class="t-stat-icon" style="background:#DBEAFE"><svg viewBox="0 0 16 16" stroke="#1D4ED8"><rect x="1" y="2" width="14" height="12" rx="1.5"/><path d="M5 1v2M11 1v2M1 6h14" stroke-linecap="round"/></svg></div><div><div class="t-stat-num">14</div><div class="t-stat-lbl">Active events</div><div class="t-stat-sub" style="color:#9CA3AF">8 wed · 6 quinces</div></div></div>
        <div class="t-stat"><div class="t-stat-icon" style="background:#FDF5F6"><svg viewBox="0 0 16 16" stroke="#C9697A"><path d="M8 1c-1.5 0-4 1.2-4 4v3L2 14h12L14 8V5c0-2.8-2.5-4-4-4Z" stroke-linejoin="round"/></svg></div><div><div class="t-stat-num">9/24</div><div class="t-stat-lbl">Dresses out</div><div class="t-stat-sub" style="color:#B45309">2 overdue</div></div></div>
      </div>
      <div class="sec-lbl">Quick actions</div>
      <div class="t-qa" style="margin-bottom:16px">
        <div class="t-qa-btn"><div class="t-qa-icon" style="background:#FDF5F6"><svg width="22" height="22" viewBox="0 0 16 16" fill="none" stroke="#C9697A" stroke-width="1.2"><path d="M8 1c-1.5 0-4 1.2-4 4v3L2 14h12L14 8V5c0-2.8-2.5-4-4-4Z" stroke-linejoin="round"/></svg></div><div class="t-qa-lbl">New rental</div></div>

function showScreen(id, navEl){
  currentScreen = id
  const screen = SCREENS[id]
  if(!screen) return
  buildSidebar(id)
  document.getElementById('main-area').innerHTML = screen.render()
  document.getElementById('screen-label-text').textContent = screen.label
  if(navEl){
    document.querySelectorAll('.snav-btn').forEach(b=>b.classList.remove('active'))
    navEl.classList.add('active')
  } else {
    document.querySelectorAll('.snav-btn').forEach((b,i)=>{
      const ids=['dashboard','events','event-detail','rentals','alterations','payments']
      b.classList.toggle('active', ids[i]===id)
    })
  }
}

showScreen('dashboard', null)
