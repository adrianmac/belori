
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;font-size:13px;background:#F0EDE9}
:root{
  --rosa:#C9697A;--rh:#B85868;--rp:#FDF5F6;--rl:#E8B4BB;
  --ink:#1C1012;--gray:#6B7280;--gl:#9CA3AF;--border:#E5E7EB;
  --ivory:#F8F4F0;--green:#15803D;--gbg:#DCFCE7;
  --amber:#B45309;--abg:#FEF3C7;--red:#B91C1C;--rbg:#FEE2E2;
  --blue:#1D4ED8;--bbg:#DBEAFE;--purple:#7C3AED;--pbg:#EDE9FE;
}

/* shell */
.shell{display:grid;grid-template-columns:220px 1fr;min-height:680px;border-radius:12px;border:1px solid var(--border);overflow:hidden;background:#F0EDE9}

/* sidebar */
.sidebar{background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column}
.sb-top{padding:14px 16px;border-bottom:1px solid var(--border)}
.sb-brand{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sb-lm{width:28px;height:28px;background:var(--ink);border-radius:6px;display:flex;align-items:center;justify-content:center}
.sb-name{font-size:13px;font-weight:500;color:var(--ink)}
.sb-plan{display:flex;align-items:center;justify-content:space-between}
.plan-badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:99px;background:#FEF3C7;color:#92400E}
.plan-link{font-size:10px;color:var(--rosa);cursor:pointer}
.sb-nav{padding:8px;flex:1}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--gray);transition:all .12s;margin-bottom:1px}
.nav-item:hover{background:var(--ivory);color:var(--ink)}
.nav-item.active{background:var(--rp);color:var(--rosa);font-weight:500}
.nav-item svg{width:14px;height:14px;stroke:currentColor;fill:none;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:9px;font-weight:500;padding:1px 6px;border-radius:99px}
.nb-green{background:var(--gbg);color:var(--green)}
.nb-amber{background:var(--abg);color:var(--amber)}
.nb-gray{background:#F3F4F6;color:var(--gray)}

/* main */
.main{padding:20px;overflow-y:auto}
.main-head{margin-bottom:18px}
.main-title{font-size:18px;font-weight:500;color:var(--ink);margin-bottom:4px}
.main-sub{font-size:12px;color:var(--gl);line-height:1.5}

/* filter bar */
.filter-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fb-pill{padding:5px 13px;border-radius:99px;border:1px solid var(--border);background:#fff;font-size:11px;font-weight:500;color:var(--gray);cursor:pointer;transition:all .12s}
.fb-pill.on{border-color:var(--rosa);background:var(--rp);color:var(--rosa)}
.fb-search{flex:1;min-width:160px;height:34px;border:1px solid var(--border);border-radius:8px;padding:0 11px;font-size:12px;outline:none;background:#fff}
.fb-search:focus{border-color:var(--rosa)}

/* module grid */
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}

/* module card */
.mod-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.mod-card:hover{border-color:var(--rosa);box-shadow:0 3px 10px rgba(0,0,0,.09)}
.mod-card.enabled{border-color:var(--green);background:#FAFFFE}
.mod-card.core{border-color:var(--border);background:var(--ivory)}
.mod-card.enabled .mod-card-footer{border-top-color:#D1FAE5}
.mod-card.core .mod-card-footer{border-top-color:var(--border)}

.mod-card-top{display:flex;align-items:flex-start;gap:11px}
.mod-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mod-icon svg{width:20px;height:20px;fill:none;stroke-width:1.4}
.mod-title-row{flex:1}
.mod-name{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.mod-tag{font-size:9px;font-weight:500;padding:2px 6px;border-radius:4px}
.t-core{background:#F3F4F6;color:var(--gray)}
.t-new{background:#EDE9FE;color:#7C3AED}
.t-pro{background:#FEF3C7;color:#92400E}
.mod-desc{font-size:11px;color:var(--gl);line-height:1.5}

.mod-features{display:flex;flex-direction:column;gap:3px}
.mf{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gray)}
.mf-dot{width:5px;height:5px;border-radius:50%;background:var(--gl);flex-shrink:0}
.mod-card.enabled .mf-dot{background:var(--green)}

.mod-card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);margin-top:2px}
.mod-plan-req{font-size:10px;color:var(--gl)}
.mod-plan-req.upgrade{color:var(--amber);font-weight:500;cursor:pointer}

/* toggle */
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.toggle-track{width:36px;height:20px;border-radius:99px;background:#E5E7EB;position:relative;transition:background .2s;flex-shrink:0}
.toggle-track.on{background:var(--green)}
.toggle-track.core-track{background:#D1D5DB;cursor:not-allowed}
.toggle-thumb{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-track.on .toggle-thumb{transform:translateX(16px)}
.toggle-lbl{font-size:11px;font-weight:500;color:var(--gray)}
.toggle-track.on + .toggle-lbl{color:var(--green)}

/* section label */
.sec-label{font-size:10px;font-weight:500;color:var(--gl);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;margin-top:16px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-label:first-child{margin-top:0}

/* stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat-cell{background:#fff;border:1px solid var(--border);border-radius:9px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-n{font-size:20px;font-weight:500;color:var(--ink);line-height:1}
.stat-n.green{color:var(--green)}.stat-n.amber{color:var(--amber)}
.stat-l{font-size:10px;color:var(--gl);margin-top:3px}

/* dependency warning */
.dep-warn{background:var(--abg);border:1px solid #FDE68A;border-radius:7px;padding:7px 10px;font-size:11px;color:#78350F;display:none;margin-top:6px}

/* save bar */
.save-bar{position:sticky;bottom:0;background:rgba(248,244,240,.95);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;display:none}
.save-bar.visible{display:flex}
.save-msg{font-size:12px;color:var(--amber);display:flex;align-items:center;gap:6px}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;white-space:nowrap;transition:all .12s}
.btn-p{background:var(--rosa);color:#fff;box-shadow:0 2px 7px rgba(201,105,122,.35)}.btn-p:hover{background:var(--rh)}
.btn-g{background:#fff;color:var(--gray);border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* sidebar changes count */
.changes-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);display:inline-block;margin-left:4px;display:none}
.changes-dot.visible{display:inline-block}

/* preview panel */
.preview-panel{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;display:none}
.preview-panel.open{display:block}

/* toast */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--gbg);color:var(--green);border:1px solid #86EFAC;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:500;z-index:999;pointer-events:none;white-space:nowrap;display:none}
</style>

    features:['Auto-handle STOP / HELP / UNSUBSCRIBE replies','Opt-out list management','Per-client SMS consent tracking','Compliance audit log','Required if Email marketing module is enabled']},

let state = MODULES.map(m=>({id:m.id,enabled:m.enabled}))
let dirty = false
let activeFilter = 'all'
let searchQ = ''
let CURRENT_PLAN = 'growth'

function getState(id){ return state.find(s=>s.id===id)?.enabled }
function setState(id,val){
  const s=state.find(s=>s.id===id)
  if(s){ s.enabled=val; dirty=true; renderSaveBar() }
}

function renderModules(){
  const main = document.getElementById('main-content')
  const cats = [...new Set(MODULES.map(m=>m.cat))]

  // group by category
  const filtered = MODULES.filter(m => {
    const q = searchQ.toLowerCase()
    const matchQ = !q || m.name.toLowerCase().includes(q) || m.desc.toLowerCase().includes(q)
    const matchF = activeFilter==='all' ? true
      : activeFilter==='enabled' ? getState(m.id)
      : activeFilter==='disabled' ? !getState(m.id) && m.cat!=='core'
      : activeFilter==='new' ? m.tag==='new'
      : activeFilter===m.cat
    return matchQ && matchF
  })

  const enabledCount = state.filter(s=>s.enabled).length
  const totalNonCore = MODULES.filter(m=>m.cat!=='core').length
  const enabledNonCore = state.filter(s=>{
    const m=MODULES.find(mm=>mm.id===s.id)
    return s.enabled && m?.cat!=='core'
  }).length

  let html = `
    <div class="main-head">
      <div class="main-title">Module manager</div>
      <div class="main-sub">Enable or disable features for Bella Bridal. Core modules are always active. Optional modules can be toggled per your plan.</div>
    </div>
    <div class="stats-bar">
      <div class="stat-cell"><div class="stat-n green">${enabledCount}</div><div class="stat-l">Active modules</div></div>
      <div class="stat-cell"><div class="stat-n">${totalNonCore - enabledNonCore}</div><div class="stat-l">Disabled</div></div>
      <div class="stat-cell"><div class="stat-n amber">${MODULES.filter(m=>m.tag==='new').length}</div><div class="stat-l">New modules</div></div>
      <div class="stat-cell"><div class="stat-n" style="color:var(--purple)">3</div><div class="stat-l">Pro-only locked</div></div>
    </div>
    <div class="filter-bar">
      <input class="fb-search" placeholder="Search modules..." id="mod-search" value="${searchQ}" oninput="searchQ=this.value;renderModules()">
      <button class="fb-pill${activeFilter==='all'?' on':''}" onclick="setFilter('all')">All</button>
      <button class="fb-pill${activeFilter==='enabled'?' on':''}" onclick="setFilter('enabled')">Enabled</button>
      <button class="fb-pill${activeFilter==='disabled'?' on':''}" onclick="setFilter('disabled')">Disabled</button>
      <button class="fb-pill${activeFilter==='new'?' on':''}" onclick="setFilter('new')">New ✨</button>
      <button class="fb-pill${activeFilter==='services'?' on':''}" onclick="setFilter('services')">Services</button>
      <button class="fb-pill${activeFilter==='finance'?' on':''}" onclick="setFilter('finance')">Finance</button>
      <button class="fb-pill${activeFilter==='security'?' on':''}" onclick="setFilter('security')">Security</button>
    </div>
  `

  // group by category
  const catGroups = {}
  filtered.forEach(m => {
    if(!catGroups[m.cat]) catGroups[m.cat]=[]
    catGroups[m.cat].push(m)
  })

  Object.entries(catGroups).forEach(([cat, mods]) => {
    html += `<div class="sec-label">${CAT_LABELS[cat]||cat}</div><div class="mod-grid">`
    mods.forEach(m => {
      const en = getState(m.id)
      const isCore = m.cat==='core'
      const planOk = PLAN_ORDER[CURRENT_PLAN] >= PLAN_ORDER[m.plan]
      const cardClass = isCore ? 'core' : en ? 'enabled' : ''

      html += `<div class="mod-card ${cardClass}">
        <div class="mod-card-top">
          <div class="mod-icon" style="background:${m.color}">
            <svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="${m.ic}" stroke-width="1.4">${ICONS[m.icon]||ICONS.star}</svg>
          </div>
          <div class="mod-title-row">
            <div class="mod-name">
              ${m.name}
              ${m.tag==='core'?'<span class="mod-tag t-core">Core</span>':''}
              ${m.tag==='new'?'<span class="mod-tag t-new">New</span>':''}
              ${m.tag==='pro'?'<span class="mod-tag t-pro">Pro</span>':''}
            </div>
            <div class="mod-desc">${m.desc}</div>
          </div>
        </div>
        <div class="mod-features">
          ${m.features.slice(0,3).map(f=>`<div class="mf"><div class="mf-dot"></div>${f}</div>`).join('')}
          ${m.features.length>3?`<div class="mf" style="color:var(--gl)"><div class="mf-dot" style="background:var(--border)"></div>+${m.features.length-3} more features</div>`:''}
        </div>
        <div class="mod-card-footer">
          <span class="mod-plan-req ${!planOk?'upgrade':''}" onclick="${!planOk?'toast2(\'Upgrade to '+PLAN_LABELS[m.plan]+' to unlock this module\')':''}">${planOk?PLAN_LABELS[m.plan]:PLAN_LABELS[m.plan]+' — upgrade to unlock'}</span>
          ${isCore
            ? `<div class="toggle"><div class="toggle-track core-track on"><div class="toggle-thumb"></div></div><span class="toggle-lbl" style="color:var(--green)">Always on</span></div>`
            : planOk
              ? `<div class="toggle" onclick="toggleModule('${m.id}')"><div class="toggle-track${en?' on':''}" id="tt-${m.id}"><div class="toggle-thumb"></div></div><span class="toggle-lbl" id="tl-${m.id}">${en?'Enabled':'Disabled'}</span></div>`
              : `<button onclick="toast2('Upgrade to ${PLAN_LABELS[m.plan]} to unlock ${m.name}')" style="height:28px;padding:0 10px;background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;border-radius:6px;font-size:10px;font-weight:500;cursor:pointer">Upgrade to unlock</button>`
          }
        </div>
      </div>`
    })
    html += `</div>`
  })

  if(filtered.length===0){
    html += `<div style="text-align:center;padding:40px;color:var(--gl)"><div style="font-size:14px;font-weight:500;color:var(--ink);margin-bottom:4px">No modules found</div><div style="font-size:12px">Try a different search or filter</div></div>`
  }

  main.innerHTML = html + renderSaveBar(true)
  // re-focus search
  const si = document.getElementById('mod-search')
  if(si && searchQ) si.setSelectionRange(si.value.length,si.value.length)
}

function renderSaveBar(returnHtml){
  const html = dirty
    ? `<div class="save-bar visible" id="save-bar">
        <div class="save-msg">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="stroke:#B45309;stroke-width:1.3"><circle cx="8" cy="8" r="7"/><path d="M8 5v3M8 11v.5" stroke-linecap="round"/></svg>
          Unsaved changes
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-g" onclick="discardChanges()">Discard</button>
          <button class="btn btn-p" onclick="saveChanges()">Save & apply changes</button>
        </div>
      </div>`
    : ''
  if(returnHtml) return html
  const existing = document.getElementById('save-bar')
  if(dirty && !existing) document.getElementById('main-content').insertAdjacentHTML('beforeend', html)
  if(!dirty && existing) existing.remove()
  // update nav badge
  const pb = document.getElementById('pending-badge')
  if(pb){ pb.style.display = dirty?'':'none' }
}

function toggleModule(id){
  const m = MODULES.find(mm=>mm.id===id)
  if(!m||m.cat==='core') return
  const cur = getState(id)
  const newVal = !cur
  setState(id, newVal)
  const tt=document.getElementById('tt-'+id)
  const tl=document.getElementById('tl-'+id)
  if(tt){ tt.classList.toggle('on',newVal) }
  if(tl){ tl.textContent = newVal?'Enabled':'Disabled'; tl.style.color = newVal?'var(--green)':''; }
  const card = tt?.closest('.mod-card')
  if(card){ card.classList.toggle('enabled',newVal); card.classList.toggle('',!newVal) }
  const pb = document.getElementById('pending-badge')
  if(pb) pb.style.display='inline'
  renderSaveBar()
}

function setFilter(f){
  activeFilter=f
  renderModules()
}

function saveChanges(){
  dirty=false
  renderModules()
  toast2('Changes saved — modules updated')
  // sync sidebar navigation visibility
}

function discardChanges(){
  state = MODULES.map(m=>({id:m.id,enabled:m.enabled}))
  dirty=false
  renderModules()
  toast2('Changes discarded')
}

function setView(v, el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'))
  el.classList.add('active')
  if(v==='modules'){ renderModules(); return }
  const msgs={
    sidebar:'Navigation editor — drag to reorder sidebar items per enabled module',
    plan:'Plan & billing — manage subscription, view usage, upgrade',
    team:'Team & roles — invite staff, set permissions per module',
    audit:'Audit log — all changes, who made them, when',
  }
  document.getElementById('main-content').innerHTML=`
    <div class="main-head">
      <div class="main-title">${el.textContent.trim()}</div>
      <div class="main-sub">${msgs[v]||''}</div>
    </div>
    <div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:40px;text-align:center;color:var(--gl);box-shadow:0 1px 4px rgba(0,0,0,.06)">
      <div style="font-size:14px;font-weight:500;color:var(--ink);margin-bottom:6px">Coming in the next build</div>
      <div style="font-size:12px;line-height:1.6">${msgs[v]||'This section is being built.'}</div>
      <button onclick="setView('modules',document.querySelector('.nav-item'))" style="margin-top:16px;height:36px;padding:0 16px;background:var(--rosa);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;box-shadow:0 2px 7px rgba(201,105,122,.3)">← Back to modules</button>
    </div>`
}

function toast2(msg){
  const t=document.getElementById('toast')
  t.textContent=msg;t.style.display='block'
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2600)
}

renderModules()
</script>
