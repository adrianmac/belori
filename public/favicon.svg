<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Warm cream card with hairline border -->
  <rect x="0.5" y="0.5" width="47" height="47" rx="4" ry="4"
        fill="#FEFBF7" stroke="#EDE7E2" stroke-width="1"/>
  <!-- Champagne-gold hairline top accent -->
  <rect x="2" y="2" width="44" height="1.2" fill="#B08A4E" opacity="0.9"/>
  <!-- Italiana "B" monogram — the house letter -->
  <text x="24" y="33" text-anchor="middle"
        font-family="Italiana, Didot, 'Bodoni 72', serif"
        font-size="30" fill="#1C1118"
        letter-spacing="0.02em">B</text>
  <!-- Diamond fleuron below the B — the atelier mark -->
  <path d="M24 39l3 3-3 3-3-3 3-3z" fill="#B08A4E" opacity="0.9"/>
</svg>
