<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Belori" />
    <meta name="theme-color" content="#C9697A" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>Belori</title>
  <style>
    :root {
      --bg-primary: #F8F4F0;
      --bg-card: #FFFFFF;
      --bg-sidebar: #FFFFFF;
      --text-primary: #1C1012;
      --text-secondary: #6B7280;
      --border-color: #E5E7EB;
      --rosa: #C9697A;

      /* Semantic status colors */
      --color-success: #10B981;
      --bg-success: #D1FAE5;
      --border-success: #6EE7B7;
      --text-success: #065F46;

      --color-danger: #DC2626;
      --bg-danger: #FEF2F2;
      --border-danger: #FECACA;
      --text-danger: #991B1B;

      --color-warning: #F59E0B;
      --bg-warning: #FEF3C7;
      --border-warning: #FDE68A;
      --text-warning: #92400E;

      --color-info: #3B82F6;
      --bg-info: #EFF6FF;
      --border-info: #BFDBFE;
      --text-info: #1E40AF;

      --color-accent: #C9697A;
      --bg-accent: #FDF5F6;
      --border-accent: #E8B4BB;
      --text-accent: #9D2235;

      --color-purple: #7C3AED;
      --bg-purple: #F5F3FF;
      --border-purple: #DDD6FE;
      --text-purple: #5B21B6;
    }
    [data-theme="dark"] {
      --bg-primary: #0F0A0B;
      --bg-card: #1C1214;
      --bg-sidebar: #160E10;
      --text-primary: #F5F0F1;
      --text-secondary: #9CA3AF;
      --border-color: #2D2023;
      --rosa: #E8889A;

      /* Semantic status colors — dark mode adjusted */
      --color-success: #34D399;
      --bg-success: #064E3B;
      --border-success: #065F46;
      --text-success: #A7F3D0;

      --color-danger: #F87171;
      --bg-danger: #450A0A;
      --border-danger: #7F1D1D;
      --text-danger: #FECACA;

      --color-warning: #FBBF24;
      --bg-warning: #451A03;
      --border-warning: #78350F;
      --text-warning: #FDE68A;

      --color-info: #60A5FA;
      --bg-info: #172554;
      --border-info: #1E3A8A;
      --text-info: #BFDBFE;

      --color-accent: #E8889A;
      --bg-accent: #2D1217;
      --border-accent: #4A1C25;
      --text-accent: #F4C2CB;

      --color-purple: #A78BFA;
      --bg-purple: #2E1065;
      --border-purple: #4C1D95;
      --text-purple: #DDD6FE;
    }
  </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
