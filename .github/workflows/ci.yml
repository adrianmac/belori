name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --reporter=verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Only run E2E when test-env secrets are configured in the repo.
    # Skip the job otherwise — it would fail on the verify-test-env safety rail.
    if: ${{ vars.RUN_E2E == 'true' }}
    env:
      VITE_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      VITE_APP_URL: http://localhost:5173
      TEST_OWNER_A_EMAIL: owner-a@belori-test.local
      TEST_OWNER_A_PASSWORD: TestPassword123!
      TEST_STAFF_A_EMAIL: coordinator-a@belori-test.local
      TEST_STAFF_A_PASSWORD: TestPassword123!
      TEST_OWNER_B_EMAIL: owner-b@belori-test.local
      TEST_OWNER_B_PASSWORD: TestPassword123!
      TEST_STAFF_B_EMAIL: seamstress-b@belori-test.local
      TEST_STAFF_B_PASSWORD: TestPassword123!
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Materialize .env.test from CI secrets
        run: |
          cat > .env.test <<EOF
          VITE_SUPABASE_URL=$VITE_SUPABASE_URL
          VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY
          TEST_SUPABASE_URL=$TEST_SUPABASE_URL
          TEST_SUPABASE_ANON_KEY=$TEST_SUPABASE_ANON_KEY
          TEST_SUPABASE_SERVICE_ROLE_KEY=$TEST_SUPABASE_SERVICE_ROLE_KEY
          VITE_APP_URL=$VITE_APP_URL
          TEST_OWNER_A_EMAIL=$TEST_OWNER_A_EMAIL
          TEST_OWNER_A_PASSWORD=$TEST_OWNER_A_PASSWORD
          TEST_STAFF_A_EMAIL=$TEST_STAFF_A_EMAIL
          TEST_STAFF_A_PASSWORD=$TEST_STAFF_A_PASSWORD
          TEST_OWNER_B_EMAIL=$TEST_OWNER_B_EMAIL
          TEST_OWNER_B_PASSWORD=$TEST_OWNER_B_PASSWORD
          TEST_STAFF_B_EMAIL=$TEST_STAFF_B_EMAIL
          TEST_STAFF_B_PASSWORD=$TEST_STAFF_B_PASSWORD
          NODE_ENV=$NODE_ENV
          EOF
      - name: Re-seed test DB (idempotent)
        run: npm run test:seed || echo "Skipping seed — run supabase link + db push first."
        continue-on-error: true
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
